name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Check fuzz target (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check --manifest-path fuzz/Cargo.toml

      - name: Install nightly Rust toolchain (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install.sh | sh
          cargo binstall -y cargo-fuzz

      - name: Run fuzz smoke test (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: cargo +nightly fuzz run handshake_downgrade -- -max_total_time=60

